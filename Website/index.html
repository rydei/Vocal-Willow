<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vocal Willow — Independent training for blind athletes.</title>
    <meta name="description" content="One sensor. Three sports. Vocal Willow gives blind cricket, paddleball, and pickleball players instant, audio-first feedback — without a coach in the loop." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "gsap": "https://esm.sh/gsap@3.12.5",
          "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger"
        }
      }
    </script>

    <style>
      *,
      *::before,
      *::after { box-sizing: border-box; }

      :root {
        /* Brand & neutrals — green palette */
        --bg: #FAFAF7;                       /* page background */
        --bg-2: #F1F0EC;                     /* hover fill */
        --bg-3: #FFFFFF;                     /* alt surface */
        --paper: #FFFFFF;                    /* cards */
        --ink: #0E5C3E;                      /* headings / logo / brand text — deep green */
        --ink-2: #1A1A1A;                    /* body text */
        --ink-dim: #6B7280;                  /* secondary text */
        --line: #E7E5E0;                     /* divider */
        --line-soft: #F1F0EC;                /* strong divider lite */

        --accent: #16A34A;                   /* emerald — buttons, links, active */
        --accent-2: #15803D;                 /* hover / pressed */
        --accent-soft: rgba(22, 163, 74, 0.08);
        --amber: #F59E0B;                    /* accent + audio highlight (never text) */

        /* Status colors */
        --status-good: #16A34A;
        --status-good-bg: #E7F3EC;
        --status-good-label: #166534;
        --status-miss: #E5484D;
        --status-miss-bg: #FDE8E8;
        --status-miss-label: #991B1B;

        /* Dark showcase stage — green-tinted */
        --stage-bg: #07140E;
        --stage-bg-2: #0B2017;
        --stage-ink: #FAFAF7;
        --stage-dim: #6B7280;
        --stage-line: rgba(250, 250, 247, 0.12);
      }

      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink-2); }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 400;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      ::selection { background: var(--accent); color: #FFFFFF; }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.06;
        mix-blend-mode: multiply;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      }

      .display {
        font-family: 'Bebas Neue', 'Inter', sans-serif;
        font-weight: 400;
        letter-spacing: -0.005em;
        line-height: 0.85;
        text-transform: uppercase;
      }
      .serif-i {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        text-transform: none;
        font-weight: 400;
        letter-spacing: -0.02em;
        color: var(--accent-2);
      }
      .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

      .container {
        width: 100%;
        max-width: 1480px;
        margin: 0 auto;
        padding: 0 28px;
      }
      @media (min-width: 900px) { .container { padding: 0 64px; } }
      a { color: inherit; }

      /* ============ NAV ============ */
      .nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        padding: 18px 28px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: padding 0.3s ease, background 0.3s ease, border-color 0.3s ease;
        border-bottom: 1px solid transparent;
      }
      .nav.scrolled {
        background: rgba(250, 250, 247, 0.9);
        backdrop-filter: blur(18px) saturate(1.2);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
        border-bottom-color: var(--line);
        padding: 14px 28px;
      }
      @media (min-width: 900px) {
        .nav { padding: 24px 64px; }
        .nav.scrolled { padding: 16px 64px; }
      }
      .nav-brand {
        display: flex; align-items: center; gap: 12px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 24px;
        letter-spacing: 0.08em;
      }
      .nav-mark {
        width: 36px; height: 36px;
        background: var(--accent);
        color: var(--bg-3);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
      }
      .nav-links {
        display: none; gap: 28px;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
        color: var(--ink-dim);
      }
      @media (min-width: 1100px) { .nav-links { display: flex; } }
      .nav-links a {
        text-decoration: none;
        transition: color 0.2s ease;
        cursor: pointer;
      }
      .nav-links a:hover { color: var(--accent); }

      .sport-pill {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--ink);
        padding: 4px;
      }
      .sport-pill button {
        background: transparent;
        border: none;
        padding: 6px 12px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--ink);
        transition: all 0.18s ease;
        font-weight: 600;
      }
      .sport-pill button:hover { color: var(--accent); }
      .sport-pill button.active { background: var(--ink); color: var(--bg-3); }

      /* ============ HERO ============ */
      .hero {
        position: relative;
        min-height: 100vh;
        padding: 150px 0 80px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .hero-bg-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, rgba(20, 20, 20, 0.035) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(20, 20, 20, 0.035) 1px, transparent 1px);
        background-size: 80px 80px;
        mask-image: radial-gradient(ellipse at 70% 30%, black 30%, transparent 75%);
        -webkit-mask-image: radial-gradient(ellipse at 70% 30%, black 30%, transparent 75%);
        pointer-events: none;
      }
      .hero-glow {
        position: absolute;
        top: 10%; right: -10%;
        width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(22, 163, 74, 0.10), transparent 65%);
        pointer-events: none;
        filter: blur(40px);
      }
      .hero-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-size: 11px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-dim);
        font-weight: 600;
        margin-bottom: 28px;
        animation: fade-up 0.9s 0.1s both;
        flex-wrap: wrap;
      }
      .hero-eyebrow::before {
        content: '';
        width: 36px; height: 1px;
        background: var(--accent);
      }
      .hero-title {
        font-size: clamp(72px, 17vw, 260px);
        margin: 0;
        animation: fade-up 1s 0.2s both;
        color: var(--ink);
      }
      .hero-title .accent { color: var(--accent); }
      .hero-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 40px;
        margin-top: 70px;
        animation: fade-up 1s 0.5s both;
      }
      @media (min-width: 900px) {
        .hero-row { grid-template-columns: 1.4fr 1fr; gap: 80px; align-items: end; }
      }
      .hero-pitch {
        font-size: clamp(20px, 2.2vw, 28px);
        line-height: 1.35;
        max-width: 820px;
      }
      .hero-pitch em { color: var(--accent); font-style: normal; font-weight: 600; }
      .hero-pitch strong { font-weight: 600; }
      .hero-pitch .serif-i { color: var(--accent-2); }
      .hero-stats { display: flex; flex-direction: column; gap: 14px; }
      .hero-stat {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--line);
      }
      .hero-stat-num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 40px;
        line-height: 1;
      }
      .hero-stat-num .red { color: var(--accent); }
      .hero-stat-label {
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--ink-dim);
        max-width: 60%;
        text-align: right;
        font-weight: 500;
      }
      .hero-scroll {
        position: absolute;
        bottom: 24px;
        left: 28px;
        font-size: 10px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-dim);
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
      }
      .hero-scroll-line {
        width: 1px; height: 40px;
        background: linear-gradient(to bottom, var(--accent), transparent);
        animation: drop 1.8s infinite;
      }
      @keyframes drop {
        0%, 100% { transform: scaleY(1); opacity: 1; }
        50% { transform: scaleY(0.4) translateY(20px); opacity: 0.3; }
      }
      @media (min-width: 900px) { .hero-scroll { left: 64px; } }

      /* ============ TICKER ============ */
      .ticker {
        background: var(--accent);
        color: var(--bg-3);
        padding: 18px 0;
        overflow: hidden;
        border-top: 1px solid var(--accent-2);
        border-bottom: 1px solid var(--accent-2);
      }
      .ticker-track {
        display: flex; gap: 60px;
        white-space: nowrap;
        animation: scroll 42s linear infinite;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        letter-spacing: 0.04em;
        will-change: transform;
      }
      .ticker-track span { display: inline-flex; align-items: center; gap: 60px; }
      .ticker-track .dot {
        display: inline-block;
        width: 8px; height: 8px;
        background: var(--bg-3);
        border-radius: 50%;
        transform: translateY(-6px);
      }
      @keyframes scroll {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }

      /* ============ SECTIONS ============ */
      section { position: relative; }
      .section { padding: 140px 0; position: relative; }
      @media (max-width: 700px) { .section { padding: 80px 0; } }
      .section-label {
        display: flex; align-items: center; gap: 16px;
        font-size: 11px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 32px;
      }
      .section-label::before {
        content: '';
        width: 36px; height: 1px;
        background: var(--accent);
      }
      .section-label .num {
        color: var(--ink-dim);
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: 0;
        font-weight: 600;
      }
      .section-h {
        font-size: clamp(44px, 8vw, 120px);
        margin: 0 0 32px;
        max-width: 1200px;
      }
      .section-h .accent { color: var(--accent); }
      .section-h .serif-i {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        text-transform: none;
        font-weight: 400;
        letter-spacing: -0.02em;
        color: var(--accent-2);
      }
      .lead {
        font-size: clamp(18px, 1.5vw, 22px);
        line-height: 1.55;
        max-width: 800px;
        margin-bottom: 28px;
      }
      .lead-dim { color: var(--ink-dim); }

      /* ============ MANIFESTO ============ */
      .manifesto {
        background: var(--bg-2);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 120px 0;
      }
      .manifesto-quote {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(40px, 6.5vw, 96px);
        line-height: 1;
        text-transform: uppercase;
        max-width: 1300px;
      }
      .manifesto-quote .accent { color: var(--accent); }
      .manifesto-attr {
        margin-top: 36px;
        font-size: 12px;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--ink-dim);
        font-weight: 600;
      }

      /* ============ CINEMATIC SHOWCASE (Dark Stage) ============ */
      .showcase {
        position: relative;
        min-height: 100vh;
        background: var(--stage-bg);
        color: var(--stage-ink);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: ns-resize;
        border-top: 1px solid var(--ink);
        border-bottom: 1px solid var(--ink);

        background-image:
          radial-gradient(ellipse 1100px 700px at 50% 45%, rgba(40, 28, 26, 0.85) 0%, transparent 60%),
          radial-gradient(ellipse 500px 280px at 50% 55%, rgba(22, 163, 74, 0.18) 0%, transparent 70%),
          radial-gradient(ellipse 800px 200px at 50% 0%, rgba(22, 163, 74, 0.08) 0%, transparent 70%),
          linear-gradient(180deg, var(--stage-bg) 0%, var(--stage-bg-2) 50%, var(--stage-bg) 100%);
      }
      .showcase::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, var(--stage-line) 1px, transparent 1px),
          linear-gradient(to bottom, var(--stage-line) 1px, transparent 1px);
        background-size: 90px 90px;
        mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 80%);
        opacity: 0.5;
        pointer-events: none;
      }
      .showcase::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.06;
        mix-blend-mode: overlay;
        pointer-events: none;
      }
      .showcase-topo {
        position: absolute;
        inset: 0;
        opacity: 0.18;
        pointer-events: none;
        z-index: 2;
      }
      .showcase-topo svg { width: 100%; height: 100%; }

      .showcase-webgl {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        opacity: 0.85;
        mix-blend-mode: screen;
        mask-image: radial-gradient(ellipse at 50% 50%, black 45%, transparent 90%);
        -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 45%, transparent 90%);
      }
      .showcase-webgl canvas { width: 100%; height: 100%; display: block; }

      .showcase-mark {
        position: absolute;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        letter-spacing: 0.08em;
        color: var(--stage-ink);
        z-index: 5;
      }
      .showcase-mark .accent { color: var(--accent); margin: 0 4px; }

      .showcase-tag {
        position: absolute;
        top: 74%;
        right: 58px;
        transform: translateY(-50%) rotate(90deg);
        transform-origin: center right;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.32em;
        color: var(--stage-dim);
        font-weight: 600;
        z-index: 5;
      }
      @media (max-width: 800px) { .showcase-tag { display: none; } }

      .showcase-hint {
        position: absolute;
        top: 100px;
        right: 36px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--stage-dim);
        font-weight: 600;
        z-index: 5;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .showcase-hint .pulse {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: blink 1.6s infinite;
      }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
      @media (max-width: 1100px) { .showcase-hint { display: none; } }

      .showcase-stage {
        position: relative;
        z-index: 3;
        width: 100%;
        height: 100vh;
        max-height: 800px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 110px 0 100px;
      }

      .bat-canvas {
        position: relative;
        height: 100%;
        max-height: 620px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: breath 7s ease-in-out infinite;
        will-change: transform;
      }
      @keyframes breath {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-6px) scale(1.005); }
      }
      .bat-canvas svg {
        height: 100%;
        width: auto;
        display: block;
        filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 30px rgba(22, 163, 74, 0.06));
      }
      .bat-canvas svg .layer {
        opacity: 1;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        transform-origin: center;
      }

      /* Data-reveal driven layer visibility. Layer 0 always visible. */
      .showcase-stage[data-reveal="0"] .layer-1,
      .showcase-stage[data-reveal="0"] .layer-2,
      .showcase-stage[data-reveal="0"] .layer-3,
      .showcase-stage[data-reveal="0"] .layer-4,
      .showcase-stage[data-reveal="0"] .layer-5 { opacity: 0; }
      .showcase-stage[data-reveal="1"] .layer-2,
      .showcase-stage[data-reveal="1"] .layer-3,
      .showcase-stage[data-reveal="1"] .layer-4,
      .showcase-stage[data-reveal="1"] .layer-5 { opacity: 0; }
      .showcase-stage[data-reveal="2"] .layer-3,
      .showcase-stage[data-reveal="2"] .layer-4,
      .showcase-stage[data-reveal="2"] .layer-5 { opacity: 0; }
      .showcase-stage[data-reveal="3"] .layer-4,
      .showcase-stage[data-reveal="3"] .layer-5 { opacity: 0; }
      .showcase-stage[data-reveal="4"] .layer-5 { opacity: 0; }

      .anno {
        position: absolute;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--stage-ink);
        opacity: 0;
        transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
        z-index: 4;
        max-width: 240px;
      }
      .showcase-stage[data-reveal="0"] .anno-0,
      .showcase-stage[data-reveal="1"] .anno-0,
      .showcase-stage[data-reveal="1"] .anno-1,
      .showcase-stage[data-reveal="2"] .anno-0,
      .showcase-stage[data-reveal="2"] .anno-1,
      .showcase-stage[data-reveal="2"] .anno-2,
      .showcase-stage[data-reveal="3"] .anno-0,
      .showcase-stage[data-reveal="3"] .anno-1,
      .showcase-stage[data-reveal="3"] .anno-2,
      .showcase-stage[data-reveal="3"] .anno-3,
      .showcase-stage[data-reveal="4"] .anno-0,
      .showcase-stage[data-reveal="4"] .anno-1,
      .showcase-stage[data-reveal="4"] .anno-2,
      .showcase-stage[data-reveal="4"] .anno-3,
      .showcase-stage[data-reveal="4"] .anno-4,
      .showcase-stage[data-reveal="5"] .anno { opacity: 1; }

      .anno .anno-line {
        display: block;
        height: 1px;
        background: var(--accent);
        margin-bottom: 10px;
      }
      .anno .anno-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 18px;
        letter-spacing: 0.04em;
        color: var(--stage-ink);
        margin-bottom: 4px;
      }
      .anno .anno-desc {
        color: var(--stage-dim);
        font-size: 10px;
        line-height: 1.6;
        letter-spacing: 0.08em;
        text-transform: none;
      }

      .showcase-sport-card {
        position: absolute;
        bottom: 40px;
        left: 36px;
        width: 220px;
        border-top: 1px solid var(--stage-line);
        padding-top: 14px;
        z-index: 5;
        transition: all 0.4s ease;
      }
      @media (max-width: 800px) { .showcase-sport-card { left: 20px; width: 160px; bottom: 120px; } }
      .ssc-label {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.22em;
        color: var(--stage-dim);
        font-weight: 600;
        margin-bottom: 8px;
      }
      .ssc-icon { height: 60px; margin: 8px 0; }
      .ssc-icon svg { height: 100%; color: var(--stage-ink); }
      .ssc-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        letter-spacing: 0.06em;
        color: var(--stage-ink);
      }
      .ssc-meta {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.18em;
        color: var(--stage-dim);
        margin-top: 8px;
        text-transform: uppercase;
      }

      .showcase-bottom {
        position: absolute;
        bottom: 40px;
        right: 36px;
        text-align: right;
        z-index: 5;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--stage-dim);
        letter-spacing: 0.18em;
        font-weight: 600;
      }
      @media (max-width: 800px) { .showcase-bottom { right: 20px; bottom: 120px; } }
      .showcase-bottom .v {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 28px;
        color: var(--stage-ink);
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }
      .showcase-bottom .v .accent { color: var(--accent); }

      .showcase-arrows {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 28px;
        z-index: 6;
      }
      .showcase-arrows button {
        width: 46px; height: 46px;
        border: 1px solid var(--stage-line);
        background: rgba(255, 255, 255, 0.03);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        color: var(--stage-ink);
        transition: all 0.2s ease;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
      .showcase-arrows button:hover {
        background: var(--accent);
        color: var(--bg-3);
        border-color: var(--accent);
      }
      .sport-dots { display: flex; align-items: center; gap: 8px; }
      .sport-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--stage-dim);
        opacity: 0.5;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .sport-dot.active {
        background: var(--accent);
        width: 28px;
        border-radius: 4px;
        opacity: 1;
      }

      .reveal-meter {
        position: absolute;
        right: 28px;
        top: 50%;
        transform: translateY(-50%);
        height: 240px;
        width: 2px;
        background: var(--stage-line);
        z-index: 5;
      }
      @media (max-width: 1100px) { .reveal-meter { display: none; } }
      .reveal-meter-fill {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: linear-gradient(to top, var(--accent), var(--amber));
        transition: height 0.4s ease;
        box-shadow: 0 0 10px var(--accent);
      }
      .reveal-meter::before {
        content: '';
        position: absolute;
        top: -20px;
        left: -10px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        color: var(--stage-dim);
        font-weight: 600;
      }
      .reveal-meter::after {
        content: attr(data-level) '/5';
        position: absolute;
        bottom: -22px;
        left: -8px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        color: var(--accent);
        font-weight: 700;
      }

      /* Sport crossfade — soft */
      .bat-fade {
        transition: opacity 0.35s ease;
      }
      .bat-fade.fading { opacity: 0; }


      /* ============ THREE SPORTS ============ */
      .three-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
        margin-top: 50px;
      }
      @media (min-width: 900px) { .three-grid { grid-template-columns: repeat(3, 1fr); } }
      .three-cell {
        background: var(--paper);
        padding: 50px 36px;
        transition: background 0.3s ease;
        cursor: pointer;
        position: relative;
      }
      .three-cell:hover { background: var(--bg-3); }
      .three-cell.active { background: var(--ink); color: var(--bg-3); }
      .three-cell.active .three-num,
      .three-cell.active .three-sub,
      .three-cell.active .three-meta,
      .three-cell.active p { color: var(--bg-3); opacity: 0.85; }
      .three-cell.active .three-icon-bg { background: var(--accent); }
      .three-cell.active .three-icon-bg svg { color: var(--bg-3); }
      .three-cell.active .three-meta { border-top-color: rgba(255,255,255,0.15); }
      .three-num {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--ink-dim);
        letter-spacing: 0.2em;
        margin-bottom: 18px;
        font-weight: 600;
      }
      .three-icon-bg {
        width: 64px; height: 64px;
        background: var(--accent-soft);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        transition: all 0.3s ease;
      }
      .three-icon-bg svg { color: var(--accent); height: 36px; width: 36px; }
      .three-cell h4 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 38px;
        margin: 0 0 6px;
        letter-spacing: 0.02em;
      }
      .three-sub {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--ink-dim);
        letter-spacing: 0.14em;
        margin-bottom: 20px;
        text-transform: uppercase;
      }
      .three-cell p {
        margin: 0 0 20px;
        font-size: 14.5px;
        line-height: 1.55;
        color: var(--ink-dim);
      }
      .three-meta {
        padding-top: 20px;
        border-top: 1px solid var(--line);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--ink-dim);
        letter-spacing: 0.08em;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      /* ============ MVP CAPABILITIES ============ */
      .mvp-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
        margin-top: 60px;
      }
      @media (min-width: 700px) { .mvp-grid { grid-template-columns: 1fr 1fr; } }
      @media (min-width: 1100px) { .mvp-grid { grid-template-columns: repeat(3, 1fr); } }
      .mvp-card {
        background: var(--paper);
        padding: 36px 28px;
        position: relative;
        transition: background 0.3s ease;
        min-height: 260px;
        display: flex;
        flex-direction: column;
      }
      .mvp-card:hover { background: var(--bg-3); }
      .mvp-card .icon-block {
        width: 52px; height: 52px;
        border: 1.5px solid var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
        color: var(--accent);
        font-family: 'Bebas Neue', sans-serif;
        font-size: 26px;
        background: var(--accent-soft);
      }
      .mvp-card h4 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 28px;
        margin: 0 0 12px;
        letter-spacing: 0.02em;
      }
      .mvp-card p {
        margin: 0;
        color: var(--ink-dim);
        font-size: 14px;
        line-height: 1.6;
      }
      .mvp-card .marker {
        position: absolute;
        top: 20px; right: 20px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--ink-dim);
        letter-spacing: 0.1em;
        font-weight: 500;
      }

      /* ============ HOW IT WORKS ============ */
      .how-flow {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        margin-top: 50px;
      }
      @media (min-width: 900px) { .how-flow { grid-template-columns: repeat(4, 1fr); } }
      .how-step {
        padding: 32px 28px;
        background: var(--paper);
        border: 1px solid var(--line);
      }
      .how-step .num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 64px;
        color: var(--accent);
        line-height: 1;
        margin-bottom: 14px;
      }
      .how-step h5 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 24px;
        margin: 0 0 8px;
        letter-spacing: 0.04em;
      }
      .how-step p {
        font-size: 13px;
        color: var(--ink-dim);
        margin: 0;
        line-height: 1.6;
      }

      /* ============ TUNING TABLE ============ */
      .tune-wrap {
        background: var(--bg-3);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
      }
      .tune-table {
        background: var(--paper);
        border: 1px solid var(--line);
        margin-top: 40px;
        overflow-x: auto;
      }
      .tune-table table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        min-width: 720px;
      }
      .tune-table th, .tune-table td {
        padding: 18px 24px;
        text-align: left;
        border-bottom: 1px solid var(--line);
      }
      .tune-table th {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        color: var(--ink-dim);
        font-weight: 700;
        background: var(--bg-3);
      }
      .tune-table td.col-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        color: var(--ink);
        letter-spacing: 0.02em;
        width: 240px;
      }
      .tune-table td.col-val { color: var(--accent); font-weight: 600; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.04em; }
      .tune-table tr:last-child td { border-bottom: none; }

      /* ============ TIMELINE ============ */
      .timeline { margin-top: 50px; position: relative; }
      .timeline::before {
        content: '';
        position: absolute;
        left: 110px;
        top: 0; bottom: 0;
        width: 1px;
        background: var(--line);
      }
      @media (max-width: 700px) { .timeline::before { left: 60px; } }
      .tl-row {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 40px;
        padding: 36px 0;
        border-bottom: 1px solid var(--line);
        position: relative;
      }
      @media (max-width: 700px) {
        .tl-row { grid-template-columns: 60px 1fr; gap: 20px; padding: 24px 0; }
      }
      .tl-week {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 22px;
        letter-spacing: 0.06em;
        color: var(--ink-dim);
        position: relative;
      }
      .tl-week::after {
        content: '';
        position: absolute;
        right: -33px;
        top: 8px;
        width: 11px; height: 11px;
        background: var(--accent);
        border-radius: 50%;
        box-shadow: 0 0 0 4px var(--bg);
      }
      @media (max-width: 700px) { .tl-week::after { right: -18px; } }
      .tl-row.active .tl-week { color: var(--accent); }
      .tl-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(28px, 4vw, 44px);
        margin: 0 0 10px;
        letter-spacing: 0.01em;
      }
      .tl-body { color: var(--ink-dim); font-size: 15px; line-height: 1.6; max-width: 760px; }

      /* ============ STATS ============ */
      .stats { background: var(--accent); color: var(--bg-3); }
      .stats .stat-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--accent-2);
        border-top: 1px solid var(--accent-2);
        border-bottom: 1px solid var(--accent-2);
      }
      @media (min-width: 900px) { .stats .stat-grid { grid-template-columns: repeat(4, 1fr); } }
      .stat-cell { background: var(--accent); padding: 56px 32px; }
      .stat-num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(60px, 9vw, 120px);
        line-height: 0.9;
      }
      .stat-label {
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 700;
        margin-top: 14px;
      }
      .stats-heading { padding: 80px 0 30px; }
      .stats-heading h3 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(40px, 7vw, 100px);
        margin: 0;
        line-height: 0.9;
        max-width: 900px;
      }

      /* ============ DEMO ============ */
      .demo { background: var(--bg-2); border-top: 1px solid var(--line); }
      .demo-stage {
        margin-top: 50px;
        padding: 50px;
        background: var(--ink);
        color: var(--bg-3);
        position: relative;
        overflow: hidden;
      }
      @media (max-width: 700px) { .demo-stage { padding: 28px; } }
      .demo-stage::before {
        content: 'LIVE';
        position: absolute;
        top: 22px; right: 22px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--accent);
        padding: 4px 10px;
        border: 1px solid var(--accent);
        animation: blink 2s infinite;
      }
      .demo-header {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: rgba(255,255,255,0.5);
        letter-spacing: 0.12em;
        margin-bottom: 24px;
        display: flex; gap: 28px; flex-wrap: wrap;
      }
      .demo-header .red { color: var(--accent); }
      .demo-event {
        display: grid;
        grid-template-columns: 70px 1fr 110px 140px;
        gap: 16px;
        padding: 14px 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        align-items: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
      }
      @media (max-width: 700px) {
        .demo-event { grid-template-columns: 60px 1fr 90px; }
        .demo-event .dist { display: none; }
      }
      .demo-event .ts { color: rgba(255,255,255,0.5); font-size: 11px; }
      .demo-event .verdict {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 24px;
        letter-spacing: 0.04em;
      }
      .demo-event .verdict.hit { color: var(--accent); }
      .demo-event .verdict.miss { color: rgba(255,255,255,0.4); }
      .demo-event .shot, .demo-event .dist {
        font-size: 11px;
        color: rgba(255,255,255,0.7);
        text-align: right;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .demo-summary {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--accent);
        font-family: 'Bebas Neue', sans-serif;
        font-size: 26px;
        letter-spacing: 0.04em;
        color: var(--accent);
        line-height: 1.2;
      }

      /* ============ TEAM ============ */
      .team-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
        margin-top: 50px;
      }
      @media (min-width: 900px) { .team-grid { grid-template-columns: repeat(3, 1fr); } }
      .team-cell {
        background: var(--paper);
        padding: 44px 32px;
        position: relative;
        transition: background 0.3s ease;
        display: flex;
        flex-direction: column;
      }
      .team-cell:hover { background: var(--bg-3); }
      .team-mono {
        width: 80px; height: 80px;
        background: var(--accent);
        color: var(--bg-3);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 38px;
        letter-spacing: 0.04em;
        margin-bottom: 24px;
      }
      .team-cell .role {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        color: var(--accent);
        margin-bottom: 12px;
        text-transform: uppercase;
        font-weight: 700;
      }
      .team-cell h5 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        margin: 0 0 6px;
        line-height: 1;
        letter-spacing: 0.02em;
      }
      .team-cell .institution {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--ink-dim);
        margin-bottom: 22px;
        letter-spacing: 0.06em;
      }
      .team-cell .lane {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 16px;
        color: var(--accent-2);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 18px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }
      .team-cell p {
        font-size: 14px;
        color: var(--ink-dim);
        line-height: 1.6;
        margin: 0;
      }
      .team-cell .placeholder { font-style: italic; opacity: 0.7; }
      .team-cell .badge {
        position: absolute;
        top: 20px; right: 20px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        color: var(--ink-dim);
        letter-spacing: 0.1em;
      }

      /* ============ TESTIMONIALS ============ */
      .test-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
        margin-top: 50px;
      }
      @media (min-width: 800px) { .test-grid { grid-template-columns: repeat(3, 1fr); } }
      .test-card {
        padding: 36px 30px;
        background: var(--paper);
        border: 1px solid var(--line);
        position: relative;
      }
      .test-card .quote-mark {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 80px;
        line-height: 0.4;
        color: var(--accent);
        height: 36px;
        font-style: italic;
      }
      .test-card .test-body {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        font-size: 18px;
        line-height: 1.45;
        color: var(--ink-2);
        margin: 16px 0 22px;
      }
      .test-card .test-meta {
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }
      .test-card .test-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 20px;
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .test-card .test-where {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--ink-dim);
        margin-top: 4px;
        text-transform: uppercase;
      }

      /* ============ ROADMAP ============ */
      .roadmap {
        margin-top: 50px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
      }
      @media (min-width: 900px) { .roadmap { grid-template-columns: repeat(4, 1fr); } }
      .roadmap-cell { padding: 36px 28px; background: var(--paper); }
      .roadmap-cell .phase {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        color: var(--accent);
        letter-spacing: 0.2em;
        margin-bottom: 14px;
        font-weight: 700;
      }
      .roadmap-cell h6 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 30px;
        margin: 0 0 16px;
        letter-spacing: 0.02em;
      }
      .roadmap-cell ul { margin: 0; padding-left: 0; list-style: none; }
      .roadmap-cell li {
        font-size: 13px;
        color: var(--ink-dim);
        line-height: 1.5;
        padding: 8px 0;
        border-top: 1px solid var(--line-soft);
      }
      .roadmap-cell li::before {
        content: '— ';
        color: var(--accent);
        font-weight: 700;
      }

      /* ============ CLOSING ============ */
      .closing {
        background: var(--bg);
        padding: 140px 0 70px;
        position: relative;
        overflow: hidden;
        border-top: 1px solid var(--line);
      }
      .closing-bg {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 1600px; height: 1600px;
        background: radial-gradient(circle, var(--accent-soft), transparent 65%);
        pointer-events: none;
        filter: blur(40px);
      }
      .closing-h {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(48px, 10vw, 160px);
        line-height: 1.06;
        text-align: center;
        margin: 0 auto;
        max-width: 1400px;
        position: relative;
      }
      .closing-h .accent { color: var(--accent); }
      .closing-h .serif-i {
        font-family: 'Fraunces', Georgia, serif;
        font-style: italic;
        text-transform: none;
        font-weight: 400;
        letter-spacing: -0.02em;
        color: var(--accent-2);
        /* Fraunces italic has a tall descender; shrink slightly and lift
           so the "p" in "practice" doesn't crash into the next line. */
        font-size: 0.88em;
        display: inline-block;
        vertical-align: -0.04em;
      }
      .closing-cta {
        display: flex;
        justify-content: center;
        gap: 14px;
        margin-top: 56px;
        flex-wrap: wrap;
      }
      .btn {
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 700;
        padding: 18px 32px;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-family: inherit;
      }
      .btn-primary { background: var(--accent); color: var(--bg-3); }
      .btn-primary:hover { background: var(--accent-2); transform: translateY(-2px); }
      .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
      .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

      /* ============ FOOTER ============ */
      footer {
        border-top: 1px solid var(--line);
        padding: 40px 0;
        font-size: 12px;
        color: var(--ink-dim);
        letter-spacing: 0.04em;
      }
      footer .row {
        display: flex; justify-content: space-between;
        flex-wrap: wrap; gap: 20px; align-items: center;
      }
      footer .brand {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 18px;
        color: var(--ink);
        letter-spacing: 0.08em;
      }

      /* ============ REVEAL (header-only) ============ */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1), transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal.in { opacity: 1; transform: none; }
      .reveal.d1 { transition-delay: 0.07s; }
      .reveal.d2 { transition-delay: 0.14s; }

      function useReveal() {
        const ref = useRef(null);
        useEffect(() => {
          const node = ref.current;
          if (!node) return;
          const targets = node.querySelectorAll('.reveal');
          if (!targets.length) return;
          const io = new IntersectionObserver((entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) {
                e.target.classList.add('in');
                io.unobserve(e.target);
              }
            });
          }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
          targets.forEach((t) => io.observe(t));
          return () => io.disconnect();
        }, []);
        return ref;
      }

      /* ============ WEBGL FLOW BACKDROP ============ */
      /* A calming, cursor-aware fluid that sits behind the bat. Single
         fullscreen quad + fragment shader doing domain-warped FBM noise.
         Cursor pulls the flow toward it gently; emerald + deep-green
         palette with a faint amber whisper near the cursor center. */
      const ShowcaseWebGL = memo(function ShowcaseWebGL() {
        const canvasRef = React.useRef(null);
        React.useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const host = canvas.parentElement?.parentElement;   // .showcase section
          if (!host) return;

          const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false, antialias: false })
                  || canvas.getContext('experimental-webgl', { alpha: true });
          if (!gl) return;                                    // graceful degrade

          const vsSrc = [
            'attribute vec2 a_pos;',
            'varying vec2 v_uv;',
            'void main(){ v_uv = a_pos * 0.5 + 0.5; gl_Position = vec4(a_pos, 0.0, 1.0); }'
          ].join('\n');

          const fsSrc = [
            'precision highp float;',
            'varying vec2 v_uv;',
            'uniform vec2 u_res;',
            'uniform vec2 u_mouse;',
            'uniform float u_time;',
            // simplex 2D noise (Ashima Arts)
            'vec3 mod289(vec3 x){ return x - floor(x*(1.0/289.0))*289.0; }',
            'vec2 mod289(vec2 x){ return x - floor(x*(1.0/289.0))*289.0; }',
            'vec3 permute(vec3 x){ return mod289(((x*34.0)+1.0)*x); }',
            'float snoise(vec2 v){',
            '  const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);',
            '  vec2 i = floor(v + dot(v, C.yy));',
            '  vec2 x0 = v - i + dot(i, C.xx);',
            '  vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);',
            '  vec4 x12 = x0.xyxy + C.xxzz; x12.xy -= i1;',
            '  i = mod289(i);',
            '  vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));',
            '  vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);',
            '  m = m*m; m = m*m;',
            '  vec3 x = 2.0 * fract(p * C.www) - 1.0;',
            '  vec3 h = abs(x) - 0.5;',
            '  vec3 ox = floor(x + 0.5);',
            '  vec3 a0 = x - ox;',
            '  m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);',
            '  vec3 g;',
            '  g.x  = a0.x  * x0.x  + h.x  * x0.y;',
            '  g.yz = a0.yz * x12.xz + h.yz * x12.yw;',
            '  return 130.0 * dot(m, g);',
            '}',
            'float fbm(vec2 p){',
            '  float v = 0.0; float a = 0.5;',
            '  for (int i = 0; i < 5; i++){ v += a*snoise(p); p *= 2.0; a *= 0.5; }',
            '  return v;',
            '}',
            'void main(){',
            '  vec2 uv = v_uv;',
            '  float ar = u_res.x / max(u_res.y, 1.0);',
            '  vec2 p = (uv - 0.5) * vec2(ar, 1.0);',
            '  vec2 m = (u_mouse - 0.5) * vec2(ar, 1.0);',
            '  float t = u_time * 0.07;',
            // domain warp
            '  vec2 q = vec2(fbm(p*1.3 + t), fbm(p*1.3 + vec2(3.1, 1.7) + t));',
            // cursor attractor — gentle pull on the flow
            '  vec2 toM = m - p;',
            '  float md = length(toM);',
            '  vec2 attract = toM * exp(-md*2.4) * 0.32;',
            '  vec2 warped = p + q*0.55 + attract;',
            '  float n = fbm(warped*1.2 + t*1.6);',
            // soft cursor glow
            '  float glow = 0.45 / (1.0 + md*md*16.0);',
            // palette
            '  vec3 darkBase  = vec3(0.020, 0.060, 0.040);',
            '  vec3 deepGreen = vec3(0.055, 0.361, 0.243);', // #0E5C3E
            '  vec3 emerald   = vec3(0.086, 0.639, 0.290);', // #16A34A
            '  vec3 amber     = vec3(0.961, 0.620, 0.043);', // #F59E0B
            '  float k = smoothstep(-0.4, 0.55, n);',
            '  vec3 col = mix(darkBase, deepGreen, k);',
            '  float ridge = smoothstep(0.35, 0.78, n);',
            '  col = mix(col, emerald*0.85, ridge*0.55);',
            // cursor center: emerald halo then a whisper of amber at the core
            '  col += emerald * glow * 0.7;',
            '  col += amber * pow(glow, 2.2) * 0.55;',
            // vignette + edge feather
            '  float vig = smoothstep(1.25, 0.35, length(uv - 0.5));',
            '  col *= vig;',
            '  float fade = smoothstep(0.0, 0.12, uv.y) * smoothstep(1.0, 0.88, uv.y) *',
            '               smoothstep(0.0, 0.08, uv.x) * smoothstep(1.0, 0.92, uv.x);',
            '  gl_FragColor = vec4(col, fade * 0.9);',
            '}'
          ].join('\n');

          const compile = (type, src) => {
            const s = gl.createShader(type);
            gl.shaderSource(s, src);
            gl.compileShader(s);
            if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
              console.warn('WebGL shader compile failed:', gl.getShaderInfoLog(s));
              gl.deleteShader(s); return null;
            }
            return s;
          };
          const vs = compile(gl.VERTEX_SHADER, vsSrc);
          const fs = compile(gl.FRAGMENT_SHADER, fsSrc);
          if (!vs || !fs) return;
          const prog = gl.createProgram();
          gl.attachShader(prog, vs); gl.attachShader(prog, fs);
          gl.linkProgram(prog);
          if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
            console.warn('WebGL link failed:', gl.getProgramInfoLog(prog)); return;
          }
          gl.useProgram(prog);

          // Fullscreen quad

              return [...prev, sport.demo[i % sport.demo.length]];
            });
            i++;
          }, 1500);
          return () => clearInterval(id);
        }, [sport.id]);
